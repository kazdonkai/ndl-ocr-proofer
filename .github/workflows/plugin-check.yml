name: Bridge Plugin Check

on:
  push:
    branches: [main]
    paths:
      # obsidian-plugin ソース全体
      - "obsidian-plugin/main.ts"
      - "obsidian-plugin/resolver.ts"
      - "obsidian-plugin/src/**"
      - "obsidian-plugin/styles.css"
      - "obsidian-plugin/manifest.json"
      - "obsidian-plugin/package.json"
      - "obsidian-plugin/versions.json"
      - "obsidian-plugin/esbuild.config.mjs"
      - "obsidian-plugin/tsconfig.json"
      # 整合チェックスクリプト
      - "scripts/check_plugin_versions.mjs"
      - "scripts/check_plugin_dist.mjs"
      # backend bridge エンドポイント（/api/bridge/* は main.py に集約）
      - "backend/main.py"
      # frontend bridge 連携
      - "frontend/src/App.jsx"
      # ドキュメント（plugin 仕様に関わるもの）
      - "README.md"
      - "obsidian-plugin/README.md"
      - "docs/RELEASE.md"
      - "docs/acceptance_scenarios.md"
      - "CLAUDE.md"
      # CHANGELOG（バージョン整合チェックが参照する）
      - "CHANGELOG.md"

  pull_request:
    paths:
      - "obsidian-plugin/main.ts"
      - "obsidian-plugin/resolver.ts"
      - "obsidian-plugin/src/**"
      - "obsidian-plugin/styles.css"
      - "obsidian-plugin/manifest.json"
      - "obsidian-plugin/package.json"
      - "obsidian-plugin/versions.json"
      - "obsidian-plugin/esbuild.config.mjs"
      - "obsidian-plugin/tsconfig.json"
      - "scripts/check_plugin_versions.mjs"
      - "scripts/check_plugin_dist.mjs"
      - "backend/main.py"
      - "frontend/src/App.jsx"
      - "README.md"
      - "obsidian-plugin/README.md"
      - "docs/RELEASE.md"
      - "docs/acceptance_scenarios.md"
      - "CLAUDE.md"
      - "CHANGELOG.md"

jobs:
  plugin-release-check:
    name: Plugin integrity check (version + dist)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: obsidian-plugin/package-lock.json

      - name: Install dependencies
        working-directory: obsidian-plugin
        run: npm ci

      # release:check を 3 ステップに分割して失敗箇所を明示する
      - name: "[1/3] Build main.js"
        working-directory: obsidian-plugin
        run: npm run build

      - name: "[2/3] Version consistency (manifest / package.json / versions.json / CHANGELOG)"
        working-directory: obsidian-plugin
        run: npm run check:version

      - name: "[3/3] Distribution artifacts present (main.js / manifest.json / versions.json / styles.css)"
        working-directory: obsidian-plugin
        run: npm run check:dist
