version: 1
# proper_nouns.prefectures.yaml — 全国共通地理語辞書
#
# 収録対象:
#   - 都道府県名 47（現代行政区画）
#   - 旧国名（単一・複数都道府県対応）
#
# 運用方針:
#   - このファイルは全文書に適用される（regions フィールドなし = 全国共通）
#   - core.yaml は「法制語・官衙・元号」のみ。地理語はすべてここに集約する
#   - regional ファイル（proper_nouns.regions.*.yaml）は郡名・村名などを収録する。
#     regional ファイルにも county/旧国名が重複定義される場合があるが、
#     それらは weight が高く（1.3〜1.5）、region_multiplier でさらに補正されるため
#     正しいリージョン判定時は regional 側が優先される
#
# 将来の公開版ファイル構成（案）:
#   - proper_nouns.core.yaml        — 法制語・官衙・元号（全国共通）
#   - proper_nouns.prefectures.yaml — 都道府県名・旧国名（全国共通、このファイル）
#   - proper_nouns.regions.*.yaml   — 郡名・村名（地域限定、47ファイル）
#   - proper_nouns.custom.yaml      — ユーザー追記用（空テンプレート）
#
# スキーマ:
#   term     : str        — 正規形
#   type     : str        — place
#   aliases  : [str]      — 異表記・略記・旧字体
#   weight   : float      — _BONUS_PROPER_NOUN_YAML に掛ける倍率（1.0 = 30pt）
#   note     : str        — 省略可

